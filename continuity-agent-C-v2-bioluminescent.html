<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continuity Agent — Bioluminescent v2</title>

  <!-- THEME C FONTS: Syne variable (wght 400-800) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet" />

  <!-- RAF shim: must run synchronously before GSAP loads -->
  <script src="js/raf-shim.js"></script>

  <!-- GSAP 3 -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <!-- Theme styles -->
  <link rel="stylesheet" href="css/bioluminescent.css" />
</head>
<body>

  <!-- LAYER 0: Emotional gradient background -->
  <div id="bg-gradient"></div>

  <!-- LAYER 1: Orb canvas — AI's cellular body -->
  <canvas id="orb-canvas"></canvas>

  <!-- LAYER 2: Frosted glass -->
  <div id="frost">
    <svg id="frost-grain" xmlns="http://www.w3.org/2000/svg"
         style="position:absolute;inset:0;width:100%;height:100%;opacity:0.31;pointer-events:none;">
      <filter id="frost-noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#frost-noise)"/>
    </svg>
  </div>

  <!-- ZONE 1: Lissajous + thinking form -->
  <div id="zone1">
    <div id="idle-mark">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="10" stroke="var(--accent)"
                stroke-width="0.8" stroke-opacity="0.25"/>
        <circle cx="14" cy="14" r="2.5" fill="var(--accent)" fill-opacity="0.3"/>
      </svg>
    </div>
    <div id="thinking-form">
      <canvas id="lissajous-canvas" width="280" height="220" style="display:block;"></canvas>
      <span id="thinking-label">Thinking...</span>
    </div>
  </div>

  <!-- ZONE 2: Content panels -->
  <div id="zone2"></div>

  <!-- ZONE 3: Shelf -->
  <div id="zone3">
    <div id="notepad-shelf-card" class="shelf-card live" style="cursor:pointer;">
      <div class="card-label">📝 Session Notes</div>
      <div class="card-sub" id="notepad-line-count">0 lines</div>
    </div>
  </div>

  <!-- TRIGGER BAR: Demo scenario buttons -->
  <div id="trigger-bar">
    <button class="trigger" data-scenario="1">
      <em>"Show me a corgi riding a unicycle at the circus"</em>
    </button>
    <button class="trigger" data-scenario="2">
      <em>"Where can I get my glasses fixed in North Portland?"</em>
    </button>
    <button class="trigger" data-scenario="3">
      <em>"Tell me about transformer architectures"</em>
    </button>
    <button id="reset-btn">×</button>
  </div>

  <!-- EMOTION STATE HUD — click any pill to preview that gradient state -->
  <div id="state-bar">
    <button class="state-btn active" data-state="idle">idle</button>
    <button class="state-btn" data-state="listening">listening</button>
    <button class="state-btn" data-state="thinking">thinking</button>
    <button class="state-btn" data-state="searching">searching</button>
    <button class="state-btn" data-state="building">building</button>
    <button class="state-btn" data-state="speaking">speaking</button>
    <button class="state-btn" data-state="excited">excited</button>
    <button id="pause-bg-btn" title="Freeze background animation">⏸</button>
  </div>

  <!-- App logic -->
  <script src="js/bioluminescent.js"></script>
</body>
</html>
